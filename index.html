<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Drive</title>
  <link href="https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png" rel="icon">
  <style>
    :root {
      --bg-color: #f9f9f9;
      --container-bg: #ffffff;
      --text-color: #333333;
      --input-bg: #ffffff;
      --input-border: #cccccc;
      --note-color: #666666;
      --hr-color: #eeeeee;
    }

    body.dark-mode {
      --bg-color: #121212;
      --container-bg: #1e1e1e;
      --text-color: #e0e0e0;
      --input-bg: #2d2d2d;
      --input-border: #444444;
      --note-color: #aaaaaa;
      --hr-color: #333333;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 2rem;
      max-width: 450px;
      margin: 0 auto;
      text-align: left;
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      background: var(--container-bg);
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: background-color 0.3s ease;
      position: relative;
    }
    .theme-toggle {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--text-color);
      padding: 0.2rem;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    input[type="text"], select {
      padding: 0.6rem;
      font-size: 1rem;
      border: 1px solid var(--input-border);
      border-radius: 4px;
      background-color: var(--input-bg);
      color: var(--text-color);
      transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }
    input[type="text"]:focus, select:focus {
      outline: none;
      border-color: #007bff;
      box-shadow: 0 0 0 2px rgba(0, 123, 255, 0.2);
    }
    .options {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.95rem;
      color: var(--text-color);
      margin-top: 0.5rem;
    }
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-top: 1rem;
    }
    button.action-btn {
      padding: 0.8rem;
      font-size: 1rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.2s;
    }
    .btn-primary {
      background-color: #007bff;
      color: white;
    }
    .btn-primary:hover {
      background-color: #0056b3;
    }
    .btn-secondary {
      background-color: #e2e8f0;
      color: #333;
    }
    .btn-secondary:hover {
      background-color: #cbd5e1;
    }
    .note {
      font-size: 0.85rem;
      color: var(--note-color);
      text-align: center;
    }
    hr {
      border: 0;
      border-top: 1px solid var(--hr-color);
      margin: 0.5rem 0;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="button-group">
      <button class="action-btn btn-primary" onclick="openWebsite()">Launch in New Window</button>
    </div>
  </div>

  <script src="persona.js"></script>
</body>
</html>
